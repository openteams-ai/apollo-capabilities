  <div class="step">
    <div class="step-num">3</div>
    <div class="step-body">
      <h4>Run it</h4>
      <p>Pixi installs your dependencies and launches the program.</p>
      <pre><code>cd programs/my-program
pixi run launch</code></pre>
    </div>
  </div>

</main>

</body>
</html>"""

d = tempfile.mkdtemp()
with open(os.path.join(d, "index.html"), "w", encoding="utf-8") as f:
    f.write(HTML)

class Handler(http.server.SimpleHTTPRequestHandler):
    def __init__(self, *args, **kwargs):
        super().__init__(*args, directory=d, **kwargs)
    def log_message(self, *a):
        pass

with socketserver.TCPServer(("localhost", PORT), Handler) as httpd:
    print(f"Server URL: http://localhost:{PORT}", flush=True)
    httpd.serve_forever()
''',
