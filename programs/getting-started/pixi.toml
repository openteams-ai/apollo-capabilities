  </style>
</head>
<body>

<div class="hero">
  <div class="badge">Welcome</div>
  <h2>Build &amp; run AI-ready programs</h2>
  <p>Collab programs are self-contained, reproducible environments that expose tools, models, and apps with a single command.</p>
</div>

<main>

  <div class="card">
    <h3>What is a program?</h3>
    <p>A program is a <strong>Nebi</strong>-managed pixi project that packages everything needed to run an AI tool, model, or application. Each program declares:</p>
    <ul>
      <li>Its <strong>dependencies</strong> — pinned conda/PyPI packages</li>
      <li>A <strong>launch task</strong> — the single command that starts the app or service</li>
      <li><strong>Metadata</strong> — name, description, target environments, and how it should run (<span class="inline-code">app</span>, <span class="inline-code">browser</span>, or <span class="inline-code">background</span>)</li>
    </ul>
  </div>

  <div class="steps-heading">Option 1 — Collab Desktop App</div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-body">
      <h4>Open the Collab Desktop App</h4>
      <p>Launch Collab Desktop on your machine. All available programs are listed in the programs browser.</p>
    </div>
  </div>

  <div class="step">
    <div class="step-num">2</div>
    <div class="step-body">
      <h4>Select a program</h4>
      <p>Click on any program card to open its detail view, where you can read its description and requirements.</p>
    </div>
  </div>

  <div class="step">
    <div class="step-num">3</div>
    <div class="step-body">
      <h4>Click Install</h4>
      <p>Collab resolves and installs all dependencies into an isolated environment, then launches the program automatically — no terminal needed. It opens in the correct context: app window, browser tab, or background service.</p>
    </div>
  </div>

  <div class="steps-heading" style="margin-top: 3rem;">Option 2 — Run locally with Nebi</div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-body">
      <h4>Install Nebi</h4>
      <p>Nebi builds on pixi to add environment versioning, sharing, and team governance. Install pixi first, then install Nebi.</p>
      <pre><code>curl -fsSL https://pixi.sh/install.sh | sh
pixi global install nebi</code></pre>
    </div>
  </div>

  <div class="step">
    <div class="step-num">2</div>
    <div class="step-body">
      <h4>Import the program</h4>
      <p>Pull the program directly from the OpenTeams registry into a local directory.</p>
      <pre><code>nebi import quay.io/openteams_programs/hello-world:latest -o ./hello-world</code></pre>
    </div>
  </div>

  <div class="step">
    <div class="step-num">3</div>
    <div class="step-body">
      <h4>Launch the program</h4>
      <p>Navigate into the imported directory and run the launch task with pixi.</p>
      <pre><code>cd hello-world
pixi run launch</code></pre>
    </div>
  </div>

  <div class="steps-heading" style="margin-top: 3rem;">Option 3 — Run locally with pixi</div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-body">
      <h4>Install pixi</h4>
      <p>Pixi is the package manager that powers every program. Install it once on your machine.</p>
      <pre><code>curl -fsSL https://pixi.sh/install.sh | sh</code></pre>
    </div>
  </div>

  <div class="step">
    <div class="step-num">2</div>
    <div class="step-body">
      <h4>Clone the repository</h4>
      <p>Clone the Collab programs repository to get all programs locally.</p>
      <pre><code>git clone https://github.com/openteams-ai/apollo-programs.git
cd apollo-programs</code></pre>
    </div>
  </div>

  <div class="step">
    <div class="step-num">3</div>
    <div class="step-body">
      <h4>Navigate to a program directory</h4>
      <p>Each program lives in its own folder inside <span class="inline-code">programs/</span>.</p>
      <pre><code>cd programs/hello-world</code></pre>
    </div>
  </div>

  <div class="step">
    <div class="step-num">4</div>
    <div class="step-body">
      <h4>Run the launch task</h4>
      <p>Pixi installs dependencies into an isolated environment on first run, then executes the <span class="inline-code">launch</span> task.</p>
      <pre><code>pixi run launch</code></pre>
    </div>
  </div>

  <div class="steps-heading" style="margin-top: 3rem;">Creating a new program</div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-body">
      <h4>Copy an existing program as a template</h4>
