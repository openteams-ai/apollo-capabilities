[workspace]
name = "getting-started"
version = "0.1.0"
description = "A welcome and getting started guide for Collab programs"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.11"

[tool.nebi.bundle]
include = ["icon.jpeg"]

[tool.nebi.program]
spec-version = "0.1.0"

[tool.nebi.program.openteams.getting-started]
name = "Getting Started"
description = "A welcome and getting started guide for Collab programs"
icon = "https://raw.githubusercontent.com/openteams-ai/apollo-programs/refs/heads/main/programs/getting-started/icon.jpeg"
author = { name = "OpenTeams", email = "info@openteams.com" }
tags = ["docs", "onboarding"]
default-target = "local"

[tool.nebi.program.openteams.getting-started.targets.local]
task = "launch"
environment = "default"
runs-in = "app"

[tasks.launch]
cmd = [
  "python",
  "-c",
  '''
import http.server, socketserver, tempfile, os, socket

def find_available_port(start=8766):
    port = start
    while port < start + 100:
        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
            try:
                s.bind(("localhost", port))
                return port
            except OSError:
                port += 1
    raise RuntimeError("No available port in range")

PORT = find_available_port()
HTML = """<!doctype html>
