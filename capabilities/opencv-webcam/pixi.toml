[workspace]
name = "opencv-webcam"
version = "0.1.0"
description = "OpenCV webcam face detection capability"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
opencv = "*"
python = "3.10.*"
requests = "*"

[tool.nebi.capability]
spec-version = "0.1.0"

[tool.nebi.capability.openteams.opencv-webcam]
name = "OpenCV Webcam"
description = "Real-time webcam face detection demo using OpenCV"
author = { name = "OpenTeams", email = "info@openteams.com" }
tags = ["opencv", "computer-vision", "webcam"]
default-target = "local"

[tool.nebi.capability.openteams.opencv-webcam.targets.local]
task = "launch"
environment = "default"
runs-in = "background"

[tasks]
launch = {cmd = "python -u webcam_capture.py" }
