[workspace]
name = "hello-world"
version = "0.1.0"
description = "A minimal hello-world capability"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.11"

[tool.nebi.capability]
spec-version = "0.1.0"

[tool.nebi.capability.openteams.hello-world]
name = "Hello World"
description = "A minimal hello world capability"
author = { name = "OpenTeams", email = "info@openteams.com" }
default-target = "local"

[tool.nebi.capability.openteams.hello-world.targets.local]
task = "launch"
environment = "default"
runs-in = "app"

[tasks]
launch = { cmd = "python -c \"import http.server, socketserver; PORT=8765; HTML=b'<!doctype html><html><head><meta charset=utf-8><title>Hello World</title><style>body{font-family:system-ui,sans-serif;display:grid;place-items:center;height:100vh;margin:0;background:#0f172a;color:#f8fafc}h1{font-size:3rem;margin:0}p{opacity:.7}</style></head><body><main><h1>Hello, world!</h1><p>Served by the hello-world capability.</p></main></body></html>'; H=type('H',(http.server.BaseHTTPRequestHandler,),{'do_GET':lambda s:(s.send_response(200),s.send_header('Content-Type','text/html; charset=utf-8'),s.send_header('Content-Length',str(len(HTML))),s.end_headers(),s.wfile.write(HTML)),'log_message':lambda *a,**k:None}); print('Server URL: http://localhost:'+str(PORT),flush=True); socketserver.TCPServer(('',PORT),H).serve_forever()\"" }