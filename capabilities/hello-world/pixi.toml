[workspace]
name = "hello-world"
version = "0.1.0"
description = "A minimal hello-world capability"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tool.nebi.capability]
spec-version = "0.1.0"

[tool.nebi.capability.openteams.hello-world]
name = "Hello World"
description = "A minimal hello world capability"
author = { name = "OpenTeams", email = "info@openteams.com" }
default-target = "local"

[tool.nebi.capability.openteams.hello-world.targets.local]
task = "launch"
environment = "default"

[tool.nebi.capability.openteams.hello-world.targets.hub]
task = "launch"
environment = "default"

[tasks]
launch = { cmd = "echo 'Hello, World!'" }
