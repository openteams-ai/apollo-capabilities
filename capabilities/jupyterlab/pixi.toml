[workspace]
name = "jupyterlab"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
ipython = ">=9.0,<10"
jupyterlab = ">=4.0,<5"
pandas = ">=2.2,<3"
polars = ">=1.0,<2"
numpy = ">=2.0,<3"

[tool.nebi.capability]
spec-version = "0.1.0"

[tool.nebi.capability.openteams.jupyterlab]
name = "JupyterLab"
description = "A minimal JupyterLab capability"
icon = "https://raw.githubusercontent.com/jupyterlab/jupyterlab/refs/heads/main/docs/source/_static/jupyter_logo.svg"
author = { name = "OpenTeams", email = "info@openteams.com" }
tags = ["jupyter", "data-science"]
default-target = "local"

[tool.nebi.capability.openteams.jupyterlab.targets.local]
task = "launch"
environment = "default"
runs-in = "browser"

[tasks]
launch = { cmd = "jupyter lab --no-browser $1" }
