[workspace]
name = "llamacpp"
version = "0.1.0"
description = "Local llama.cpp inference server with auto-downloaded binaries and model"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
huggingface_hub = "*"

[tool.nebi.bundle]
include = ["app.py", "serve.py", "icon.jpg"]

[tool.nebi.capability]
spec-version = "0.1.0"

[tool.nebi.capability.openteams.llamacpp]
name = "llama.cpp Local Server"
description = "OpenAI-compatible local inference server. Auto-detects OS/arch/GPU, downloads the matching llama.cpp build and model GGUFs, then serves on llama.cpp's default port 8080."
icon = "https://raw.githubusercontent.com/openteams-ai/apollo-capabilities/refs/heads/main/capabilities/llamacpp/icon.jpg"
author = { name = "OpenTeams", email = "info@openteams.com" }
tags = ["llm", "inference", "llama.cpp", "local"]
default-target = "local"

[tool.nebi.capability.openteams.llamacpp.targets.local]
task = "serve"
environment = "gpu"
runs-in = "background"

# ===========================================================================
# Shared tasks (platform-independent)
# ===========================================================================
[tasks]

test-message = '''python -c "
import urllib.request, json
req = urllib.request.Request('http://localhost:8080/v1/chat/completions',
    data=json.dumps({'model':'default','messages':[{'role':'user','content':'Hello! Who are you?'}],'max_tokens':4096}).encode(),
    headers={'Content-Type':'application/json'})
resp = json.loads(urllib.request.urlopen(req).read())
msg = resp['choices'][0]['message']
thinking = msg.get('reasoning_content') or msg.get('reasoning') or ''
if thinking:
    print('--- THINKING ---'); print(thinking); print('--- REPLY ---')
print(msg.get('content') or '(no content)')
print('--- USAGE ---')
print(resp.get('usage', {}))
" '''

# ===========================================================================
# CPU feature (default) — no GPU acceleration
# ===========================================================================
[feature.cpu.tasks]
download-llamacpp = { cmd = "python app.py", env = { LLAMA_BACKEND = "cpu" } }

[feature.cpu.target.linux-64.tasks.serve]
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models LD_LIBRARY_PATH=bin:$LD_LIBRARY_PATH python serve.py \
  --model "{{ model }}" \
  --backend cpu"""
depends-on = ["download-llamacpp"]

[feature.cpu.target.osx-arm64.tasks.serve]
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models python serve.py \
  --model "{{ model }}" \
  --backend cpu"""
depends-on = ["download-llamacpp"]

[feature.cpu.target.win-64.tasks.serve]
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models python serve.py \
  --model "{{ model }}" \
  --backend cpu"""
depends-on = ["download-llamacpp"]

# ===========================================================================
# GPU feature — Vulkan on Linux, Metal on macOS, CUDA on Windows
#
# GPU presence is checked at runtime in app.py rather than via pixi
# system-requirements, because pixi system-requirements cannot be scoped
# per-platform within a feature, and macOS GPU does not require CUDA.
# Users can override Windows CUDA detection with: CONDA_OVERRIDE_CUDA=12.4
# ===========================================================================
[feature.gpu.tasks]
download-llamacpp = { cmd = "python app.py", env = { LLAMA_BACKEND = "gpu" } }

[feature.gpu.target.linux-64.tasks.serve]
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models LD_LIBRARY_PATH=bin:$LD_LIBRARY_PATH python serve.py \
  --model "{{ model }}" \
  --backend gpu"""
depends-on = ["download-llamacpp"]

[feature.gpu.target.osx-arm64.tasks.serve]
# macOS Metal is built-in; -ngl 999 offloads to Apple GPU
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models python serve.py \
  --model "{{ model }}" \
  --backend gpu"""
depends-on = ["download-llamacpp"]

[feature.gpu.target.win-64.tasks.serve]
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models PATH="bin:$PATH" python serve.py \
  --model "{{ model }}" \
  --backend gpu"""
depends-on = ["download-llamacpp"]

# ===========================================================================
# Environments
# ===========================================================================
[environments]
default = { features = ["cpu"], solve-group = "default" }
gpu = { features = ["gpu"], solve-group = "default" }
