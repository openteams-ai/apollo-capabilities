[feature.gpu.target.linux-64.tasks.serve]
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models LD_LIBRARY_PATH=bin:$LD_LIBRARY_PATH bin/llama-server \
  -hf "{{ model }}" \
  -fa on \
  -c 24000 \
  --n-gpu-layers 999 \
  --top-k 20 --top-p 0.95 --min-p 0.0 \
  --jinja --temp 0.7 -mg 0 -np 1"""
depends-on = ["download-llamacpp"]

[feature.gpu.target.osx-arm64.tasks.serve]
# macOS Metal is built-in; -ngl 999 offloads to Apple GPU
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models bin/llama-server \
  -hf "{{ model }}" \
  -fa on \
  -c 24000 \
  --n-gpu-layers 999 \
  --top-k 20 --top-p 0.95 --min-p 0.0 \
  --jinja --temp 0.7 -np 1"""
depends-on = ["download-llamacpp"]

[feature.gpu.target.win-64.tasks.serve]
args = [{ arg = "model", default = "unsloth/gemma-4-E4B-it-GGUF:Q4_K_M" }]
cmd = """HF_HOME=models PATH="bin:$PATH" bin/llama-server \
  -hf "{{ model }}" \
  -fa on \
  -c 24000 \
  --n-gpu-layers 999 \
  --top-k 20 --top-p 0.95 --min-p 0.0 \
  --jinja --temp 0.7 -mg 0 -np 1"""
depends-on = ["download-llamacpp"]

# ===========================================================================
# Environments
# ===========================================================================
[environments]
default = { features = ["cpu"], solve-group = "default" }
gpu = { features = ["gpu"], solve-group = "default" }
