[workspace]
name = "research-assistant"
version = "0.1.0"
description = "Web-based research agent that searches the web and synthesizes findings using any OpenAI-compatible LLM"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
pip = "*"

[pypi-dependencies]
fastapi = ">=0.115,<1"
uvicorn = { version = ">=0.30,<1", extras = ["standard"] }
openai = ">=1.40,<2"
sse-starlette = ">=2.1,<3"
ddgs = "*"

[tool.nebi.bundle]
include = ["backend", "frontend"]

[tool.nebi.capability]
spec-version = "0.1.0"

[tool.nebi.capability.openteams.research-assistant]
name = "Research Assistant"
description = "Web-based research agent that searches the web and synthesizes findings using any OpenAI-compatible LLM"
icon = "https://raw.githubusercontent.com/openteams-ai/apollo-capabilities/refs/heads/main/capabilities/research-assistant/icon.png"
author = { name = "OpenTeams", email = "info@openteams.com" }
tags = ["research", "agent", "web-search", "llm", "openai-compatible", "mcp"]
default-target = "local"

[tool.nebi.capability.openteams.research-assistant.targets.local]
task = "launch"
environment = "default"
runs-in = "browser"

[tasks]
launch = "uvicorn backend.main:app --port 8000"
