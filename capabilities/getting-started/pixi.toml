[workspace]
name = "getting-started"
version = "0.1.0"
description = "A welcome and getting started guide for Collab capabilities"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.11"

[tool.nebi.bundle]
include = ["app.py", "index.html"]

[tool.nebi.capability]
spec-version = "0.1.0"

[tool.nebi.capability.openteams.getting-started]
name = "Getting Started"
description = "A welcome and getting started guide for Collab capabilities"
author = { name = "OpenTeams", email = "info@openteams.com" }
tags = ["docs", "onboarding"]
default-target = "local"

[tool.nebi.capability.openteams.getting-started.targets.local]
task = "launch"
environment = "default"
runs-in = "app"

[tasks]
launch = { cmd = "python app.py" }
